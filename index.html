<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAPER-MILL OS | Asset & Machine Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --bg: #020617; --sidebar: #0f172a; --primary: #38bdf8; --accent: #22d3ee;
            --success: #10b981; --danger: #f43f5e; --warning: #fbbf24; --text: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* --- SIDEBAR & MAIN --- */
        #sidebar { width: 300px; background: var(--sidebar); border-right: 1px solid rgba(255,255,255,0.1); padding: 30px; display: flex; flex-direction: column; }
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .card { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255,255,255,0.08); padding: 25px; border-radius: 24px; margin-bottom: 25px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .hidden { display: none !important; }

        /* --- MACHINE SPECIAL UI --- */
        .machine-card { border-left: 6px solid var(--primary); transition: 0.3s; cursor: pointer; }
        .machine-card:hover { transform: translateY(-5px); background: rgba(30, 41, 59, 0.6); }
        .health-bar { height: 8px; width: 100%; background: #1e293b; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .health-fill { height: 100%; background: var(--success); }
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; }
        
        /* --- MODAL --- */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 10001; }
        .modal-body { background: #0f172a; width: 700px; padding: 40px; border-radius: 30px; border: 1px solid var(--primary); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; color: #64748b; font-size: 0.8rem; border-bottom: 1px solid #1e293b; }
        td { padding: 15px; border-bottom: 1px solid #1e293b; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color:var(--primary); margin-bottom: 30px;">CEO PANEL</h2>
    <div class="nav-item" style="cursor:pointer; margin-bottom: 15px;" onclick="location.reload()"><i class="fas fa-home"></i> Home</div>
    <div class="nav-item" style="color:var(--primary); font-weight: 800;"><i class="fas fa-cog"></i> MACHINE ASSETS</div>
</div>

<main>
    <h2 style="margin-bottom: 20px;">Factory Asset Monitoring (Live)</h2>
    
    <div class="grid-3" id="machineList">
        <!-- Machine Cards will be injected here -->
    </div>

    <div class="card" style="margin-top: 30px; border: 1px dashed var(--warning);">
        <h3><i class="fas fa-tools"></i> Maintenance Forecast</h3>
        <p style="margin-top: 10px; color: #94a3b8;">AI predicts <b>Press-Unit X1</b> will require bearing replacement in 14 days based on vibration patterns.</p>
    </div>
</main>

<!-- MACHINE DETAIL MODAL -->
<div id="modal">
    <div class="modal-body">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="mName" style="color:var(--primary);">Machine Detail</h2>
            <span id="mStatus" class="badge">Running</span>
        </div>
        <hr style="opacity:0.1; margin: 20px 0;">
        
        <div class="grid-3" style="margin-bottom: 30px;">
            <div><p style="color:#64748b;">Daily Output</p><h3 id="mOutput">0 Tons</h3></div>
            <div><p style="color:#64748b;">Fuel/Power</p><h3 id="mPower">0 kWh</h3></div>
            <div><p style="color:#64748b;">Temp</p><h3 id="mTemp">0°C</h3></div>
        </div>

        <h3>Assigned Crew</h3>
        <table id="crewTable">
            <thead><tr><th>Name</th><th>Role</th><th>Shift</th></tr></thead>
            <tbody></tbody>
        </table>

        <div style="margin-top:30px; display:flex; gap:10px;">
            <button class="badge" style="background:var(--primary); color:#000; padding:10px 20px; border:none; cursor:pointer;" onclick="alert('Maintenance log generated!')">Download Log</button>
            <button class="badge" style="background:var(--danger); color:#fff; padding:10px 20px; border:none; cursor:pointer;" onclick="closeModal()">Close</button>
        </div>
    </div>
</div>

<script>
    const machines = [
        {
            id: 1, name: "Heavy Press X1", supervisor: "Rajesh Hamal", health: 92, status: "Optimal",
            output: "45 Tons", power: "1,200", temp: "42",
            crew: [
                {n: "Swastik P.", r: "Lead Operator", s: "Morning"},
                {n: "Hari Thapa", r: "Helper", s: "Morning"}
            ]
        },
        {
            id: 2, name: "Cutter Alpha-09", supervisor: "Suman KC", health: 45, status: "Needs Service",
            output: "12 Tons", power: "800", temp: "68",
            crew: [
                {n: "Binod Rai", r: "Operator", s: "Night"},
                {n: "Sita Shah", r: "Technician", s: "On-Call"}
            ]
        },
        {
            id: 3, name: "Steam Boiler B2", supervisor: "Ganesh M.", health: 88, status: "Running",
            output: "N/A (Steam)", power: "2,500", temp: "180",
            crew: [
                {n: "Ram Lama", r: "Safety Officer", s: "24/7"}
            ]
        }
    ];

    function renderMachines() {
        const list = document.getElementById('machineList');
        list.innerHTML = machines.map(m => `
            <div class="card machine-card" onclick="viewMachine(${m.id})">
                <div style="display:flex; justify-content:space-between;">
                    <h4>${m.name}</h4>
                    <span class="badge" style="background:${m.health < 50 ? 'var(--danger)' : 'var(--success)'}">${m.status}</span>
                </div>
                <p style="font-size:0.8rem; color:#64748b; margin-top:5px;">Lead: ${m.supervisor}</p>
                <div class="health-bar">
                    <div class="health-fill" style="width:${m.health}%; background:${m.health < 50 ? 'var(--danger)' : 'var(--success)'}"></div>
                </div>
                <p style="font-size:0.7rem; text-align:right;">Health Score: ${m.health}%</p>
            </div>
        `).join('');
    }

    function viewMachine(id) {
        const m = machines.find(x => x.id === id);
        document.getElementById('mName').innerText = m.name;
        document.getElementById('mOutput').innerText = m.output;
        document.getElementById('mPower').innerText = m.power + " kWh";
        document.getElementById('mTemp').innerText = m.temp + "°C";
        document.getElementById('mStatus').innerText = m.status;
        document.getElementById('mStatus').style.background = m.health < 50 ? 'var(--danger)' : 'var(--success)';

        const tbody = document.querySelector('#crewTable tbody');
        tbody.innerHTML = m.crew.map(c => `
            <tr><td>${c.n}</td><td>${c.r}</td><td>${c.s}</td></tr>
        `).join('');

        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    renderMachines();
</script>
</body>
</html>
